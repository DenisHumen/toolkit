<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="TOOLKIT — scripts for very different tasks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#FFFFFF" opacity="0.05"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="760" height="320" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="760" height="320" rx="28" fill="url(#dots)"/>
  <rect x="1.5" y="1.5" width="757" height="317" rx="27" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- emblem -->
  <g filter="url(#soft)">
    <rect x="70" y="85" width="150" height="150" rx="34" fill="url(#accent)"/>
  </g>

  <!-- terminal window -->
  <rect x="98" y="115" width="94" height="86" rx="12" fill="#0B1220" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <circle cx="116" cy="132" r="4" fill="#FB7185"/>
  <circle cx="132" cy="132" r="4" fill="#FBBF24"/>
  <circle cx="148" cy="132" r="4" fill="#34D399"/>

  <!-- prompt: >_ -->
  <polyline points="112,158 126,172 112,186" fill="none" stroke="#E2E8F0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="138" y="180" width="26" height="7" rx="3.5" fill="#34D399"/>

  <!-- gear badge (automation) -->
  <g fill="#F8FAFC">
    <rect x="201" y="200" width="8" height="32" rx="3" transform="rotate(0 205 216)"/>
    <rect x="201" y="200" width="8" height="32" rx="3" transform="rotate(45 205 216)"/>
    <rect x="201" y="200" width="8" height="32" rx="3" transform="rotate(90 205 216)"/>
    <rect x="201" y="200" width="8" height="32" rx="3" transform="rotate(135 205 216)"/>
  </g>
  <circle cx="205" cy="216" r="14" fill="#F8FAFC"/>
  <circle cx="205" cy="216" r="6" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="270" y="158" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="2" fill="url(#ink)">TOOLKIT</text>
  <rect x="272" y="178" width="300" height="6" rx="3" fill="url(#accent)"/>
  <text x="272" y="214" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0.5" fill="#94A3B8">Scripts for very different tasks</text>
</svg>
